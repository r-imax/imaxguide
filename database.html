<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAX Theatre Database - Global View</title>
    <meta name="description" content="Browse IMAX theatres worldwide with advanced filtering by region, projector type, and specifications.">
    
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/database.css">
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">Home</a> / <strong>Global Database</strong>
        </div>

        <div class="page-header">
            <h1 class="page-title">IMAX Theatre Database</h1>
            <p class="page-subtitle">Browse and search all IMAX locations worldwide</p>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="regionSelect">Region</label>
                    <select id="regionSelect">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="countrySelect">Country</label>
                    <select id="countrySelect">
                        <option value="">All Countries</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="adminDivSelect">State / Province</label>
                    <select id="adminDivSelect">
                        <option value="">All Divisions</option>
                    </select>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label for="citySelect">City</label>
                    <select id="citySelect">
                        <option value="">All Cities</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="projectorFilter">Digital Projector</label>
                    <select id="projectorFilter">
                        <option value="">All Types</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="aspectRatioFilter">Screen Aspect</label>
                    <select id="aspectRatioFilter">
                        <option value="">All Sizes</option>
                    </select>
                </div>
            </div>
            <div class="control-row control-row-actions">
                <div class="control-group">
                    <label for="filmCapabilityFilter">Film Capable</label>
                    <select id="filmCapabilityFilter">
                        <option value="">All Theatres</option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Units</label>
                    <div class="unit-toggle" role="group" aria-label="Dimension units">
                        <button type="button" class="unit-option active" data-unit="metric">Metric</button>
                        <button type="button" class="unit-option" data-unit="imperial">Imperial</button>
                    </div>
                </div>
                <div class="control-group controls-button-group">
                    <label aria-hidden="true">&nbsp;</label>
                    <button id="resetBtn" class="btn btn-secondary">Reset</button>
                    <button id="exportBtn" class="btn btn-secondary">Export CSV</button>
                </div>
            </div>
            <div class="control-row search-row">
                <div class="control-group">
                    <label for="searchInput">Search</label>
                    <input type="text" id="searchInput" placeholder="Location name...">
                </div>
            </div>
        </div>

        <div id="loadingDiv" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading IMAX theatre data...</p>
        </div>

        <div id="statsContainer" class="stats-container">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalTheatres">0</div>
                    <div class="stat-label">Total Theatres</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalRegions">0</div>
                    <div class="stat-label">Countries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalCities">0</div>
                    <div class="stat-label">Cities</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="projectorTypes">0</div>
                    <div class="stat-label">Projector Types</div>
                </div>
            </div>
        </div>

        <div id="errorDiv" class="error-container"></div>

        <div id="tableContainer" class="table-container" style="display: none;">
            <div class="table-scroll-wrapper">
                <table id="theatreTable">
                    <thead>
                        <tr>
                            <th class="sortable-column" data-sort-field="Region"><button type="button" class="sort-button"><span class="sort-label">Region</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Country"><button type="button" class="sort-button"><span class="sort-label">Country/Area</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Administrative Division"><button type="button" class="sort-button"><span class="sort-label">Province/State</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="City"><button type="button" class="sort-button"><span class="sort-label">City</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Location Name"><button type="button" class="sort-button"><span class="sort-label">Location Name</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Screen Aspect Ratio (AR)"><button type="button" class="sort-button"><span class="sort-label">Screen Aspect Ratio</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Digital Projector"><button type="button" class="sort-button"><span class="sort-label">Digital Projector</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Maximum AR for digital projection"><button type="button" class="sort-button"><span class="sort-label">Max Digital AR</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Film Projector"><button type="button" class="sort-button"><span class="sort-label">Film Projector</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Height"><button type="button" class="sort-button"><span class="sort-label">Height</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Width"><button type="button" class="sort-button"><span class="sort-label">Width</span><span class="sort-indicator"></span></button></th>
                            <th class="sortable-column" data-sort-field="Commercial films shown?"><button type="button" class="sort-button"><span class="sort-label">Commercial Films</span><span class="sort-indicator"></span></button></th>
                        </tr>
                    </thead>
                    <tbody id="theatreTableBody">
                    </tbody>
                </table>
            </div>
            <button id="tableScrollArrow" class="table-scroll-arrow" type="button" aria-label="Scroll table right">&rarr;</button>
        </div>

        <footer class="footer">
            <p>Open-source IMAX theatre database. Not affiliated with IMAX Corporation.</p>
            <div class="footer-links">
                <a href="https://github.com/r-imax/imaxguide" target="_blank">GitHub</a>
                <a href="about/">About</a>
                <a href="about/">License</a>
            </div>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/theatre-database.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const database = new TheatreDatabase({
                csvFiles: window.CSV_FILES,
                region: null,
                enableComparison: true,
                showRegionColumn: true
            });
            database.initialize();
        });
    </script>
</body>
</html>
